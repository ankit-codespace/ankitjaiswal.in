<svg viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
  <!-- Square squircle tile background -->
  <rect x="0" y="0" width="140" height="140" rx="32" fill="#132018" />
  
  <!-- Subtle inner ring stroke for depth -->
  <rect x="0" y="0" width="140" height="140" rx="32" fill="none" stroke="#1E3428" stroke-width="2" opacity="0.6" />
  
  <!-- Paper shadow (depth) -->
  <rect x="39" y="25" width="66" height="86" rx="8" fill="#0A1410" opacity="0.4" />
  
  <!-- Paper body -->
  <rect x="37" y="23" width="66" height="86" rx="8" fill="#EDE7DC" />
  
  <!-- Dog-ear fold (matches tile background color) -->
  <polygon points="103,109 103,83 77,109" fill="#132018" />
  
  <!-- Pen diagonal line (Electric Teal) -->
  <line x1="77" y1="109" x2="103" y2="83" stroke="#0EA5A0" stroke-width="3.2" stroke-linecap="round" />
  
  <!-- Pen nib dot at tip of line (instantly readable) -->
  <circle cx="77" cy="109" r="2.8" fill="#0EA5A0" />
  
  <!-- Text lines - optically centered in paper -->
  <line x1="49" y1="47" x2="89" y2="47" stroke="#9E9285" stroke-width="5.5" stroke-linecap="round" />
  <line x1="49" y1="65" x2="89" y2="65" stroke="#9E9285" stroke-width="5.5" stroke-linecap="round" opacity="0.65" />
  <line x1="49" y1="83" x2="67" y2="83" stroke="#9E9285" stroke-width="5.5" stroke-linecap="round" opacity="0.28" />
</svg>